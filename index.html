<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="description" content="A5x Home - Smart Home Dashboard" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>A5x HOME</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ===========================
       CSS VARIABLES & RESET
    =========================== */
    :root {
      --bg-primary: #050510;
      --bg-secondary: #0a0a1e;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glass-hover: rgba(255, 255, 255, 0.08);

      --neon-blue: #00d4ff;
      --neon-purple: #bf00ff;
      --neon-cyan: #00ffee;
      --neon-pink: #ff00aa;
      --neon-green: #00ff88;

      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.6);
      --text-muted: rgba(255, 255, 255, 0.3);

      --glow-blue: 0 0 20px rgba(0, 212, 255, 0.4), 0 0 40px rgba(0, 212, 255, 0.2);
      --glow-purple: 0 0 20px rgba(191, 0, 255, 0.4), 0 0 40px rgba(191, 0, 255, 0.2);
      --glow-pink: 0 0 20px rgba(255, 0, 170, 0.4), 0 0 40px rgba(255, 0, 170, 0.2);
      --glow-cyan: 0 0 20px rgba(0, 255, 238, 0.4), 0 0 40px rgba(0, 255, 238, 0.2);

      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-xl: 32px;

      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* LIGHT MODE */
    .light-mode {
      --bg-primary: #e8eaf6;
      --bg-secondary: #f0f2ff;
      --glass-bg: rgba(255, 255, 255, 0.35);
      --glass-border: rgba(255, 255, 255, 0.6);
      --glass-hover: rgba(255, 255, 255, 0.55);
      --text-primary: #1a1a2e;
      --text-secondary: rgba(26, 26, 46, 0.7);
      --text-muted: rgba(26, 26, 46, 0.4);
      --neon-blue: #0099cc;
      --neon-purple: #8800cc;
      --neon-cyan: #00aacc;
      --neon-pink: #cc0077;
      --neon-green: #00aa66;
      --glow-blue: 0 0 15px rgba(0, 153, 204, 0.3), 0 0 30px rgba(0, 153, 204, 0.1);
      --glow-purple: 0 0 15px rgba(136, 0, 204, 0.3), 0 0 30px rgba(136, 0, 204, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      transition: var(--transition-slow);
      cursor: default;
    }

    /* ===========================
       BACKGROUND ANIMATION
    =========================== */
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .gradient-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--neon-purple); top: -200px; right: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: var(--neon-blue); bottom: -100px; left: -100px; animation-delay: 3s; }
    .orb-3 { width: 300px; height: 300px; background: var(--neon-pink); top: 50%; left: 50%; animation-delay: 6s; }

    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* ===========================
       LAYOUT
    =========================== */
    .app-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 0 16px 120px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ===========================
       HEADER
    =========================== */
    header {
      padding: 40px 0 24px;
      text-align: center;
      position: relative;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    h1.app-title {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.5));
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.5)); }
      50% { filter: drop-shadow(0 0 16px rgba(191, 0, 255, 0.7)); }
    }

    .app-subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* STATUS INDICATOR */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-secondary);
      transition: var(--transition);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      transition: var(--transition);
    }

    .status-dot.connected {
      background: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green), 0 0 16px rgba(0, 255, 136, 0.4);
      animation: dotPulse 2s ease-in-out infinite;
    }

    .status-dot.offline {
      background: var(--neon-pink);
      box-shadow: 0 0 8px var(--neon-pink);
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* THEME TOGGLE */
    .theme-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: var(--transition);
      color: var(--text-primary);
    }

    .theme-btn:hover {
      background: var(--glass-hover);
      box-shadow: var(--glow-blue);
      transform: scale(1.1) rotate(15deg);
    }

    /* GREETING SECTION */
    .greeting {
      margin: 24px 0 8px;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .time-display {
      font-family: 'Orbitron', monospace;
      font-size: 42px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 2px;
      line-height: 1;
    }

    .date-display {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ===========================
       SECTION TITLES
    =========================== */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 28px 0 14px;
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .section-count {
      font-size: 11px;
      color: var(--neon-blue);
      letter-spacing: 1px;
    }

    /* ===========================
       SUMMARY STATS
    =========================== */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-md);
      padding: 14px 10px;
      text-align: center;
      transition: var(--transition);
    }

    .stat-card:hover {
      transform: translateY(-2px);
      background: var(--glass-hover);
    }

    .stat-number {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ===========================
       DEVICE CARDS
    =========================== */
    #devices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .device-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      padding: 20px 16px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .device-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.03));
      pointer-events: none;
    }

    .device-card:hover {
      transform: translateY(-4px) scale(1.02);
      background: var(--glass-hover);
      border-color: rgba(255,255,255,0.2);
    }

    .device-card.on {
      border-color: rgba(0, 212, 255, 0.4);
    }

    .device-card.on .device-glow {
      opacity: 1;
    }

    /* per-device accent colors */
    .device-card[data-color="blue"].on { border-color: rgba(0, 212, 255, 0.5); box-shadow: 0 0 30px rgba(0, 212, 255, 0.15); }
    .device-card[data-color="purple"].on { border-color: rgba(191, 0, 255, 0.5); box-shadow: 0 0 30px rgba(191, 0, 255, 0.15); }
    .device-card[data-color="pink"].on { border-color: rgba(255, 0, 170, 0.5); box-shadow: 0 0 30px rgba(255, 0, 170, 0.15); }
    .device-card[data-color="cyan"].on { border-color: rgba(0, 255, 238, 0.5); box-shadow: 0 0 30px rgba(0, 255, 238, 0.15); }

    .device-glow {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 2px;
      opacity: 0;
      transition: var(--transition);
    }

    .device-card[data-color="blue"] .device-glow { background: linear-gradient(90deg, transparent, var(--neon-blue), transparent); }
    .device-card[data-color="purple"] .device-glow { background: linear-gradient(90deg, transparent, var(--neon-purple), transparent); }
    .device-card[data-color="pink"] .device-glow { background: linear-gradient(90deg, transparent, var(--neon-pink), transparent); }
    .device-card[data-color="cyan"] .device-glow { background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); }

    .device-icon-wrap {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 14px;
      transition: var(--transition);
      background: rgba(255,255,255,0.06);
    }

    .device-card.on[data-color="blue"] .device-icon-wrap { background: rgba(0, 212, 255, 0.15); box-shadow: 0 0 16px rgba(0, 212, 255, 0.3); }
    .device-card.on[data-color="purple"] .device-icon-wrap { background: rgba(191, 0, 255, 0.15); box-shadow: 0 0 16px rgba(191, 0, 255, 0.3); }
    .device-card.on[data-color="pink"] .device-icon-wrap { background: rgba(255, 0, 170, 0.15); box-shadow: 0 0 16px rgba(255, 0, 170, 0.3); }
    .device-card.on[data-color="cyan"] .device-icon-wrap { background: rgba(0, 255, 238, 0.15); box-shadow: 0 0 16px rgba(0, 255, 238, 0.3); }

    .device-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .device-location {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* Toggle Switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-status {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .device-card.on .toggle-status { color: var(--neon-green); }

    .toggle-switch {
      width: 40px; height: 22px;
      background: rgba(255,255,255,0.1);
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .device-card.on[data-color="blue"] .toggle-switch { background: rgba(0, 212, 255, 0.4); box-shadow: 0 0 10px rgba(0, 212, 255, 0.4); }
    .device-card.on[data-color="purple"] .toggle-switch { background: rgba(191, 0, 255, 0.4); box-shadow: 0 0 10px rgba(191, 0, 255, 0.4); }
    .device-card.on[data-color="pink"] .toggle-switch { background: rgba(255, 0, 170, 0.4); box-shadow: 0 0 10px rgba(255, 0, 170, 0.4); }
    .device-card.on[data-color="cyan"] .toggle-switch { background: rgba(0, 255, 238, 0.4); box-shadow: 0 0 10px rgba(0, 255, 238, 0.4); }

    .toggle-thumb {
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 3px; left: 3px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .device-card.on .toggle-thumb { transform: translateX(18px); }

    /* Ripple effect */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: scale(0);
      animation: rippleAnim 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ===========================
       FLOATING ADD BUTTON
    =========================== */
    #add-btn {
      position: fixed;
      bottom: 32px;
      right: 24px;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(191, 0, 255, 0.3), 0 8px 32px rgba(0,0,0,0.4);
      transition: var(--transition);
      z-index: 100;
      animation: fabFloat 3s ease-in-out infinite;
    }

    @keyframes fabFloat {
      0%, 100% { transform: translateY(0); box-shadow: 0 0 20px rgba(0, 212, 255, 0.5), 0 0 40px rgba(191, 0, 255, 0.3), 0 8px 32px rgba(0,0,0,0.4); }
      50% { transform: translateY(-4px); box-shadow: 0 0 30px rgba(0, 212, 255, 0.7), 0 0 60px rgba(191, 0, 255, 0.4), 0 16px 40px rgba(0,0,0,0.5); }
    }

    #add-btn:hover {
      transform: scale(1.1) rotate(90deg) !important;
      animation: none;
    }

    #add-btn:active { transform: scale(0.95) !important; }

    /* Install button */
    #install-btn {
      position: fixed;
      bottom: 32px;
      left: 24px;
      padding: 12px 18px;
      border-radius: 30px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-secondary);
      display: none;
      z-index: 100;
      transition: var(--transition);
      align-items: center;
      gap: 8px;
    }

    #install-btn:hover {
      background: var(--glass-hover);
      box-shadow: var(--glow-blue);
      color: var(--neon-blue);
    }

    #install-btn.visible { display: flex; }

    /* ===========================
       MODAL
    =========================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: #0d0d1e;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 480px;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .light-mode .modal { background: #f0f2ff; }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 0 auto 24px;
    }

    .modal-title {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 24px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      outline: none;
      transition: var(--transition);
    }

    .light-mode .form-input { background: rgba(0,0,0,0.06); color: #1a1a2e; }

    .form-input:focus {
      border-color: var(--neon-blue);
      box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.15);
    }

    .color-picker {
      display: flex;
      gap: 10px;
    }

    .color-option {
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition);
    }

    .color-option.selected { border-color: #fff; transform: scale(1.2); }
    .color-option[data-val="blue"] { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }
    .color-option[data-val="purple"] { background: var(--neon-purple); box-shadow: 0 0 10px var(--neon-purple); }
    .color-option[data-val="pink"] { background: var(--neon-pink); box-shadow: 0 0 10px var(--neon-pink); }
    .color-option[data-val="cyan"] { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }

    .emoji-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .emoji-option {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: var(--transition);
    }

    .emoji-option.selected,
    .emoji-option:hover {
      background: rgba(0, 212, 255, 0.15);
      border-color: var(--neon-blue);
      transform: scale(1.1);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-cancel, .btn-add {
      flex: 1;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: var(--transition);
    }

    .btn-cancel {
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
      border: 1px solid var(--glass-border);
    }

    .btn-cancel:hover { background: rgba(255,255,255,0.1); }

    .btn-add {
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
      color: #fff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    .btn-add:hover { box-shadow: 0 0 30px rgba(0, 212, 255, 0.5), 0 0 60px rgba(191, 0, 255, 0.3); transform: translateY(-1px); }

    /* ===========================
       LOADING SCREEN
    =========================== */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #050510;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease;
    }

    #loading-screen.fade-out { opacity: 0; pointer-events: none; }

    .loader-title {
      font-family: 'Orbitron', monospace;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titlePulse 2s ease-in-out infinite;
    }

    .loader-bar-wrap {
      width: 160px; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      border-radius: 3px;
      animation: loadBar 1.5s ease-out forwards;
      box-shadow: 0 0 8px var(--neon-blue);
    }

    @keyframes loadBar { to { width: 100%; } }

    .loader-text {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      animation: blink 1.2s ease-in-out infinite;
    }

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ===========================
       TOAST NOTIFICATION
    =========================== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(10,10,30,0.95);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 12px 20px;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--text-secondary);
      z-index: 1000;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      white-space: nowrap;
    }

    .light-mode .toast { background: rgba(240,242,255,0.95); }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ===========================
       QUICK SCENE BUTTONS
    =========================== */
    .scenes-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    .scenes-row::-webkit-scrollbar { display: none; }

    .scene-btn {
      flex-shrink: 0;
      padding: 10px 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-secondary);
      transition: var(--transition);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .scene-btn:hover {
      background: var(--glass-hover);
      color: var(--neon-blue);
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.15);
    }

    /* ===========================
       CARD ENTER ANIMATION
    =========================== */
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .device-card { animation: cardEnter 0.4s ease-out both; }

    /* stagger */
    .device-card:nth-child(1) { animation-delay: 0.05s; }
    .device-card:nth-child(2) { animation-delay: 0.1s; }
    .device-card:nth-child(3) { animation-delay: 0.15s; }
    .device-card:nth-child(4) { animation-delay: 0.2s; }

    /* ===========================
       RESPONSIVE
    =========================== */
    @media (max-width: 360px) {
      .time-display { font-size: 34px; }
      h1.app-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader-title">A5x</div>
    <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
    <div class="loader-text">Initializing Systems...</div>
  </div>

  <!-- Background Orbs -->
  <div class="gradient-orb orb-1"></div>
  <div class="gradient-orb orb-2"></div>
  <div class="gradient-orb orb-3"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Main App -->
  <div class="app-wrapper">

    <!-- HEADER -->
    <header>
      <div class="header-top">
        <div class="logo-section">
          <h1 class="app-title">A5x HOME</h1>
          <p class="app-subtitle">Smart Home Dashboard</p>
        </div>
        <div class="header-actions">
          <div class="status-badge" id="status-badge">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Connecting</span>
          </div>
          <button class="theme-btn" id="theme-btn" title="Toggle Theme">🌙</button>
        </div>
      </div>

      <!-- Time -->
      <div class="greeting" id="greeting">Good Morning</div>
      <div class="time-display" id="clock">00:00</div>
      <div class="date-display" id="date-display">Loading...</div>
    </header>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="stat-total">0</div>
        <div class="stat-label">Devices</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-on">0</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-rooms">1</div>
        <div class="stat-label">Rooms</div>
      </div>
    </div>

    <!-- SCENES -->
    <div class="section-header">
      <span class="section-title">Quick Scenes</span>
    </div>
    <div class="scenes-row">
      <button class="scene-btn" onclick="setScene('all-on')">☀️ All On</button>
      <button class="scene-btn" onclick="setScene('all-off')">🌙 All Off</button>
      <button class="scene-btn" onclick="setScene('movie')">🎬 Movie</button>
      <button class="scene-btn" onclick="setScene('sleep')">😴 Sleep</button>
    </div>

    <!-- DEVICES -->
    <div class="section-header">
      <span class="section-title">Devices</span>
      <span class="section-count" id="device-count">0 Online</span>
    </div>
    <div id="devices-grid">
      <!-- Cards rendered by JS -->
    </div>

  </div>

  <!-- Floating Add Button -->
  <button id="add-btn" title="Add Device">+</button>

  <!-- Install Button -->
  <button id="install-btn">📲 Install</button>

  <!-- Add Device Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Add New Device</div>

      <div class="form-group">
        <label class="form-label">Device Name</label>
        <input type="text" class="form-input" id="input-name" placeholder="e.g. Bedroom Fan" maxlength="24" />
      </div>

      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" class="form-input" id="input-location" placeholder="e.g. Bedroom" maxlength="20" />
      </div>

      <div class="form-group">
        <label class="form-label">Icon</label>
        <div class="emoji-picker" id="emoji-picker">
          <div class="emoji-option selected" data-emoji="💡">💡</div>
          <div class="emoji-option" data-emoji="🔌">🔌</div>
          <div class="emoji-option" data-emoji="❄️">❄️</div>
          <div class="emoji-option" data-emoji="🔊">🔊</div>
          <div class="emoji-option" data-emoji="📺">📺</div>
          <div class="emoji-option" data-emoji="🌡️">🌡️</div>
          <div class="emoji-option" data-emoji="🔒">🔒</div>
          <div class="emoji-option" data-emoji="🚿">🚿</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Color Accent</label>
        <div class="color-picker" id="color-picker">
          <div class="color-option selected" data-val="blue"></div>
          <div class="color-option" data-val="purple"></div>
          <div class="color-option" data-val="pink"></div>
          <div class="color-option" data-val="cyan"></div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
        <button class="btn-add" id="btn-add-confirm">Add Device</button>
      </div>
    </div>
  </div>

  <!-- ==============================
       SCRIPTS
  ============================== -->
  <!-- Firebase SDK (Modular via CDN compat) -->
  <script type="module">
    // ================================================================
    // FIREBASE CONFIG — Replace with your actual Firebase project keys
    // ================================================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue,
      set,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

   const firebaseConfig = {
  apiKey: "AIzaSyCjPTuY4QnhRbM8ZmbcNgY49TdfS5poxZQ",
  authDomain: "home-automation-a5x.firebaseapp.com",
  projectId: "home-automation-a5x",
  storageBucket: "home-automation-a5x.firebasestorage.app",
  messagingSenderId: "412536927952",
  appId: "1:412536927952:web:a98ab4de410986d78e10d5",
  databaseURL: "https://home-automation-a5x-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

    // ================================================================
    // INIT FIREBASE
    // ================================================================
    let db = null;
    let firebaseReady = false;

    try {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      firebaseReady = true;
      setStatus(true);
    } catch (e) {
      console.warn("Firebase init failed (using local mode):", e.message);
      setStatus(false);
    }

    // ================================================================
    // STATE
    // ================================================================
    // Default devices (Firebase paths: /home/light1, /home/light2)
    let devices = [
      { id: "light1",  name: "Light 1",  location: "Living Room", icon: "💡", color: "blue",   state: 0,
fbPath: "/home/devices/light1/state" },
      { id: "light2",  name: "Light 2",  location: "Bedroom",     icon: "💡", color: "purple", state: 0,
fbPath: "/home/devices/light2/state" },
    ];

    // Load persisted devices from localStorage
    const saved = localStorage.getItem("a5x_devices");
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        // merge: keep default Firebase paths but restore user-added devices
        const userAdded = parsed.filter(d => !["light1","light2"].includes(d.id));
        devices = [...devices, ...userAdded];
      } catch(e) {}
    }

    // ================================================================
    // FIREBASE LISTENERS
    // ================================================================
   function setupFirebaseListeners() {
  if (!firebaseReady || !db) return;

  devices.forEach(device => {
    if (!device.fbPath) return;

    const dbRef = ref(db, device.fbPath);

    onValue(dbRef, (snapshot) => {
      let val = snapshot.val();

      val = Number(val);

      if (val === 0 || val === 1) {
        device.state = val;
        updateCardUI(device.id, val);
        refreshStats();
      }
    });
  });
}

 
    // ================================================================
    // TOGGLE A DEVICE (write to Firebase or local)
    // ================================================================
    window.toggleDevice = function(id) {
      const device = devices.find(d => d.id === id);
      if (!device) return;

      const newState = device.state === 1 ? 0 : 1;
      device.state = newState;

      // Sound
      playClick();

      // Firebase write
      if (firebaseReady && db && device.fbPath) {
        set(ref(db, device.fbPath), newState)
          .then(() => showToast(`${device.name} ${newState ? 'ON ✦' : 'OFF'}`))
          .catch(() => showToast("Firebase write failed — local only"));
      } else {
        showToast(`${device.name} ${newState ? 'ON ✦' : 'OFF'} (local)`);
      }

      updateCardUI(id, newState);
      refreshStats();
      saveLocal();
    };

    // ================================================================
    // RENDER DEVICE CARDS
    // ================================================================
    function renderDevices() {
      const grid = document.getElementById("devices-grid");
      grid.innerHTML = "";

      devices.forEach((device, i) => {
        const card = document.createElement("div");
        card.className = `device-card${device.state ? " on" : ""}`;
        card.setAttribute("data-color", device.color);
        card.setAttribute("data-id", device.id);
        card.style.animationDelay = `${i * 0.05}s`;

        card.innerHTML = `
          <div class="device-glow"></div>
          <div class="device-icon-wrap">${device.icon}</div>
          <div class="device-name">${device.name}</div>
          <div class="device-location">${device.location}</div>
          <div class="toggle-wrap">
            <span class="toggle-status">${device.state ? "ON" : "OFF"}</span>
            <div class="toggle-switch">
              <div class="toggle-thumb"></div>
            </div>
          </div>
        `;

        card.addEventListener("click", (e) => {
          createRipple(e, card);
          toggleDevice(device.id);
        });

        grid.appendChild(card);
      });

      refreshStats();
    }

    // ================================================================
    // UPDATE SINGLE CARD UI (without re-render)
    // ================================================================
    function updateCardUI(id, state) {
      const card = document.querySelector(`[data-id="${id}"]`);
      if (!card) return;
      if (state) {
        card.classList.add("on");
      } else {
        card.classList.remove("on");
      }
      const statusSpan = card.querySelector(".toggle-status");
      if (statusSpan) statusSpan.textContent = state ? "ON" : "OFF";
    }

    // ================================================================
    // STATS
    // ================================================================
    function refreshStats() {
      const total = devices.length;
      const active = devices.filter(d => d.state === 1).length;
      document.getElementById("stat-total").textContent = total;
      document.getElementById("stat-on").textContent = active;
      document.getElementById("device-count").textContent = `${active} Online`;
    }

    // ================================================================
    // SCENE CONTROLS
    // ================================================================
    window.setScene = function(scene) {
      let targetState = 0;
      if (scene === "all-on") targetState = 1;
      else if (scene === "all-off") targetState = 0;
      else if (scene === "movie") {
        // Only light2 ON
        devices.forEach(d => {
          const s = d.id === "light2" ? 1 : 0;
          d.state = s;
          if (firebaseReady && db && d.fbPath) set(ref(db, d.fbPath), s);
          updateCardUI(d.id, s);
        });
        showToast("🎬 Movie Mode");
        saveLocal(); refreshStats(); return;
      } else if (scene === "sleep") targetState = 0;

      devices.forEach(d => {
        d.state = targetState;
        if (firebaseReady && db && d.fbPath) set(ref(db, d.fbPath), targetState);
        updateCardUI(d.id, targetState);
      });
      showToast(scene === "all-on" ? "☀️ All Lights On" : "🌙 All Lights Off");
      saveLocal(); refreshStats();
    };

    // ================================================================
    // ADD DEVICE MODAL
    // ================================================================
    let selectedEmoji = "💡";
    let selectedColor = "blue";

    // Emoji picker
    document.querySelectorAll(".emoji-option").forEach(opt => {
      opt.addEventListener("click", () => {
        document.querySelectorAll(".emoji-option").forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        selectedEmoji = opt.dataset.emoji;
      });
    });

    // Color picker
    document.querySelectorAll(".color-option").forEach(opt => {
      opt.addEventListener("click", () => {
        document.querySelectorAll(".color-option").forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        selectedColor = opt.dataset.val;
      });
    });

    document.getElementById("add-btn").addEventListener("click", () => {
      document.getElementById("modal-overlay").classList.add("open");
    });

    document.getElementById("btn-cancel").addEventListener("click", closeModal);
    document.getElementById("modal-overlay").addEventListener("click", (e) => {
      if (e.target === document.getElementById("modal-overlay")) closeModal();
    });

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("open");
    }

    document.getElementById("btn-add-confirm").addEventListener("click", () => {
      const name = document.getElementById("input-name").value.trim();
      const location = document.getElementById("input-location").value.trim() || "Home";
      if (!name) { document.getElementById("input-name").focus(); return; }

      const id = "device_" + Date.now();
      const newDevice = {
        id, name, location,
        icon: selectedEmoji,
        color: selectedColor,
        state: 0,
       fbPath: `/home/devices/${id}/state`
      };

      devices.push(newDevice);
      saveLocal();
      renderDevices();

      // Setup FB listener for new device too
      if (firebaseReady && db) {
        const dbRef = ref(db, newDevice.fbPath);
        onValue(dbRef, (snapshot) => {
          let val = snapshot.val();
         val = Number(val);

if (val === 0 || val === 1) {
            newDevice.state = val;
            updateCardUI(newDevice.id, val);
            refreshStats();
          }
        });
      }

      closeModal();
      document.getElementById("input-name").value = "";
      document.getElementById("input-location").value = "";
      showToast(`${newDevice.icon} ${name} added!`);
    });

    // ================================================================
    // LOCAL PERSISTENCE
    // ================================================================
    function saveLocal() {
      localStorage.setItem("a5x_devices", JSON.stringify(devices));
    }

    // ================================================================
    // STATUS BADGE
    // ================================================================
    function setStatus(connected) {
      const dot = document.getElementById("status-dot");
      const text = document.getElementById("status-text");
      if (connected) {
        dot.className = "status-dot connected";
        text.textContent = "Connected";
      } else {
        dot.className = "status-dot offline";
        text.textContent = "Offline";
      }
    }

    // ================================================================
    // THEME TOGGLE
    // ================================================================
    let darkMode = true;
    document.getElementById("theme-btn").addEventListener("click", () => {
      darkMode = !darkMode;
      document.body.classList.toggle("light-mode", !darkMode);
      document.getElementById("theme-btn").textContent = darkMode ? "🌙" : "☀️";
      showToast(darkMode ? "🌙 Dark Mode" : "☀️ Light Mode");
    });

    // ================================================================
    // CLOCK
    // ================================================================
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      document.getElementById("clock").textContent = `${h}:${m}`;

      const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      document.getElementById("date-display").textContent =
        `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

      const hr = now.getHours();
      let greet = hr < 12 ? "Good Morning" : hr < 17 ? "Good Afternoon" : "Good Evening";
      document.getElementById("greeting").textContent = greet;
    }

    setInterval(updateClock, 1000);
    updateClock();

    // ================================================================
    // RIPPLE EFFECT
    // ================================================================
    function createRipple(e, el) {
      const ripple = document.createElement("div");
      ripple.className = "ripple";
      const rect = el.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${e.clientX - rect.left - size/2}px;
        top: ${e.clientY - rect.top - size/2}px;
      `;
      el.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    }

    // ================================================================
    // SOUND FEEDBACK
    // ================================================================
    function playClick() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }

    // ================================================================
    // TOAST
    // ================================================================
    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2000);
    }

    // ================================================================
    // PWA — Install Prompt
    // ================================================================
    let deferredPrompt;
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById("install-btn").classList.add("visible");
    });

    document.getElementById("install-btn").addEventListener("click", async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === "accepted") showToast("App Installed! 🚀");
      deferredPrompt = null;
      document.getElementById("install-btn").classList.remove("visible");
    });

    // ================================================================
    // INIT
    // ================================================================
    window.addEventListener("load", () => {
      // Remove loading screen after 1.8s
      setTimeout(() => {
        document.getElementById("loading-screen").classList.add("fade-out");
        setTimeout(() => document.getElementById("loading-screen").remove(), 600);
      }, 1800);

      renderDevices();
      setupFirebaseListeners();
    });
  </script>

  <!-- ================================================================
       SERVICE WORKER REGISTRATION (PWA)
  ================================================================ -->
  <script>
    // Register inline Service Worker via blob URL
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'a5x-v1';
        const ASSETS = ['/'];

        self.addEventListener('install', e => {
          e.waitUntil(
            caches.open(CACHE).then(c => c.addAll(ASSETS))
          );
          self.skipWaiting();
        });

        self.addEventListener('activate', e => {
          e.waitUntil(
            caches.keys().then(keys =>
              Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
            )
          );
          self.clients.claim();
        });

        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.match(e.request).then(r => r || fetch(e.request))
          );
        });
      `;
      /*
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url)
        .then(() => console.log('[A5x] Service Worker ready'))
        .catch(err => console.log('[A5x] SW error:', err));
        */
    }

    // Inline Web App Manifest
    const manifest = {
      name: "A5x Home",
      short_name: "A5x",
      description: "Smart Home Dashboard",
      start_url: "/",
      display: "standalone",
      background_color: "#050510",
      theme_color: "#0a0a1e",
      icons: [
        {
          src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='90' fill='%230a0a1e'/><text y='340' font-size='300' text-anchor='middle' x='256'>💡</text></svg>",
          sizes: "512x512",
          type: "image/svg+xml"
        }
      ]
    };

    const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    const mUrl = URL.createObjectURL(mBlob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = mUrl;
    document.head.appendChild(link);
  </script>

</body>
</html>
